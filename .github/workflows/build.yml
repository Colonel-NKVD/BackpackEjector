name: Build BackpackEjector Plugin

on: [push]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      # Указываем путь к файлу проекта внутри вложенных папок
      run: nuget restore BackpackEjector/BackpackEjector.csproj

    - name: Build
      # Собираем конкретный файл проекта
      run: msbuild BackpackEjector/BackpackEjector.csproj /p:Configuration=Release /p:TargetFramework=net48

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: BackpackEjector-Release
        # Используем маску **, чтобы GitHub сам нашел готовую DLL в папке bin
        path: "**/bin/Release/net48/BackpackEjector.dll"
