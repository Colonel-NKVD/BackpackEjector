name: Build Plugins

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Plugins
      # Этот шаг найдет и соберет все проекты в репозитории автоматически
      run: msbuild **/BackpackEjector.csproj /p:Configuration=Release /p:TargetFramework=net48

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Plugins-Pack
        path: "**/bin/Release/net48/*.dll"
