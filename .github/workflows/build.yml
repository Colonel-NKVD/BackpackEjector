name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build
      # Звездочка сама найдет любой .csproj файл, какой бы ты ни положил
      run: msbuild *.csproj /p:Configuration=Release /p:TargetFramework=net48

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: Plugin-Build
        # Звездочка найдет любую готовую DLL в папке bin
        path: "**/bin/Release/net48/*.dll"
