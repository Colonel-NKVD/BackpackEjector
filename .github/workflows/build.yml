name: Build BackpackEjector Plugin

on: [push]

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build
      shell: pwsh
      run: |
        # 1. Автоматически находим файл проекта
        $proj = Get-ChildItem -Recurse -Filter "*.csproj" | Select-Object -First 1
        if (!$proj) { throw "Файл .csproj не найден в репозитории!" }
        $projPath = $proj.FullName
        Write-Host "Выбран проект: $projPath"

        # 2. Собираем проект (NuGet restore встроен в современные версии MSBuild /t:Restore)
        msbuild $projPath /t:Restore /p:Configuration=Release /p:TargetFramework=net48
        msbuild $projPath /p:Configuration=Release /p:TargetFramework=net48

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: BackpackEjector-Release
        path: "**/bin/Release/net48/*.dll"
