- name: Build BackpackEjector
      # Использование ключа **/*.csproj позволяет найти файл в любой подпапке
      run: msbuild **/BackpackEjector.csproj /p:Configuration=Release /p:TargetFramework=net48

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build BackpackEjector
      run: msbuild BackpackEjector/BackpackEjector.csproj /p:Configuration=Release /p:TargetFramework=net48

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BackpackEjector-Plugin
        path: BackpackEjector/bin/Release/net48/BackpackEjector.dll
